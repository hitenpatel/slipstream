name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run typecheck
      - run: pnpm turbo run lint
      - run: pnpm turbo run test:coverage
      - run: pnpm turbo run build

      - name: upload coverage to codecov
        if: success() || failure()
        uses: codecov/codecov-action@v5
        with:
          # Public repo: no token required for uploads from forks or main.
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            packages/protocol/coverage/lcov.info,
            packages/client/coverage/lcov.info,
            apps/sync/coverage/lcov.info,
            apps/web/coverage/lcov.info
          # Each lcov file is named for its workspace so Codecov shows the
          # per-package contribution as a separate flag.
          flags: protocol,client,sync,web
          fail_ci_if_error: false

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: build web + sync
        run: pnpm turbo run build --filter=@slipstream/web --filter=@slipstream/sync

      - name: install playwright browsers
        run: pnpm --filter @slipstream/web exec playwright install --with-deps chromium

      - name: run e2e
        run: pnpm --filter @slipstream/web test:e2e

      - name: upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  docker:
    name: docker image build smoke
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build sync image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.sync
          push: false
          load: false
          tags: slipstream-sync:ci
      - name: build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.web
          push: false
          load: false
          tags: slipstream-web:ci

  deploy:
    name: deploy to tracker.hiten.dev
    runs-on: ubuntu-latest
    needs: [verify, e2e, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Deploy is owner-triggered. Wired to a Tailscale-reachable box via SSH;
    # owner provides DEPLOY_SSH_HOST, DEPLOY_SSH_USER, DEPLOY_SSH_KEY and the
    # Tailscale OAuth secrets. Fork PRs never reach here because of the ref check.
    steps:
      - uses: actions/checkout@v4
      - name: skip if secrets absent
        id: gate
        run: |
          if [ -z "${{ secrets.DEPLOY_SSH_HOST }}" ]; then
            echo "DEPLOY_SSH_HOST not set — skipping deploy step." >> $GITHUB_STEP_SUMMARY
            echo "ready=false" >> $GITHUB_OUTPUT
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi
      - name: tailscale connect
        if: steps.gate.outputs.ready == 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: ssh and pull
        if: steps.gate.outputs.ready == 'true'
        env:
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          printf "%s" "$KEY" > ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=accept-new "$USER@$HOST" \
            'cd ~/slipstream && git pull --ff-only && docker compose -f infra/docker-compose.yml up -d --build'
