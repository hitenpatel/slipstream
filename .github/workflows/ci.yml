name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run typecheck
      - run: pnpm turbo run lint
      - run: pnpm turbo run test
      - run: pnpm turbo run build

  docker:
    name: docker image build smoke
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build sync image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.sync
          push: false
          load: false
          tags: slipstream-sync:ci
      - name: build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile.web
          push: false
          load: false
          tags: slipstream-web:ci

  deploy:
    name: deploy to tracker.hiten.dev
    runs-on: ubuntu-latest
    needs: [verify, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Deploy is owner-triggered. Wired to a Tailscale-reachable box via SSH;
    # owner provides DEPLOY_SSH_HOST, DEPLOY_SSH_USER, DEPLOY_SSH_KEY and the
    # Tailscale OAuth secrets. Fork PRs never reach here because of the ref check.
    steps:
      - uses: actions/checkout@v4
      - name: skip if secrets absent
        id: gate
        run: |
          if [ -z "${{ secrets.DEPLOY_SSH_HOST }}" ]; then
            echo "DEPLOY_SSH_HOST not set — skipping deploy step." >> $GITHUB_STEP_SUMMARY
            echo "ready=false" >> $GITHUB_OUTPUT
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi
      - name: tailscale connect
        if: steps.gate.outputs.ready == 'true'
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: ssh and pull
        if: steps.gate.outputs.ready == 'true'
        env:
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          printf "%s" "$KEY" > ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=accept-new "$USER@$HOST" \
            'cd ~/slipstream && git pull --ff-only && docker compose -f infra/docker-compose.yml up -d --build'
