# Compose for the slipstream stack.
#
# Hooks into the existing Traefik instance on this box:
#   - shared network: home-server_frontend (external)
#   - entrypoint:     web-secure
#   - cert resolver:  myresolver (Cloudflare DNS-01)
#
# tracker.hiten.dev resolves to this box; Traefik issues the cert via DNS-01
# on first request because the Cloudflare token already covers the zone.

services:
  db:
    # NB: pinned to 4.4 because the NAS CPU lacks AVX (Mongo 5+ requires it).
    # 4.4 still gives us multi-document transactions in a replica set, which is
    # all the engine needs. If we move to a modern host later, bump to mongo:8.
    image: mongo:4.4
    container_name: slipstream-db
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - slipstream-db:/data/db
    networks: [internal]
    healthcheck:
      # Self-initiates the single-node replica set on first healthy run, then
      # reports healthy once it has a PRIMARY. Mongo 4.4's `rs.status()` returns
      # {ok:0} instead of throwing when the set isn't initialised, so we have to
      # check the ok flag explicitly. Transactions need a replica set even with
      # one node; we'll switch to `mongosh` when the host can run Mongo 5+.
      test:
        - CMD-SHELL
        - |
          mongo --quiet --eval '
            var s = rs.status();
            if (!s.ok) {
              rs.initiate({_id:"rs0",members:[{_id:0,host:"db:27017"}]});
              quit(1);
            }
            quit(s.myState === 1 ? 0 : 1);
          '
      interval: 5s
      start_period: 30s
      retries: 20
    labels:
      - sablier.enable=true
      - sablier.group=slipstream

  # Optional Redis sidecar for cross-instance presence + poke fan-out (M7d).
  # Single-instance deploys can leave REDIS_URL unset and skip this service.
  # Uncomment together with sync's REDIS_URL line and depends_on entry.
  # redis:
  #   image: redis:7-alpine
  #   container_name: slipstream-redis
  #   restart: unless-stopped
  #   networks: [internal]
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     retries: 3

  sync:
    build:
      context: ..
      dockerfile: infra/Dockerfile.sync
    container_name: slipstream-sync
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://db:27017/slipstream?replicaSet=rs0
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set in .env}
      PORT: "8787"
      # Uncomment along with the redis service above to enable cross-instance
      # presence + poke fan-out:
      # REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
    networks: [internal, frontend]
    labels:
      - com.centurylinklabs.watchtower.enable=false
      - traefik.enable=true
      - traefik.docker.network=home-server_frontend
      - "traefik.http.routers.slipstream-sync.rule=Host(`tracker.hiten.dev`) && (PathPrefix(`/api/sync`) || PathPrefix(`/api/push`) || PathPrefix(`/api/pull`) || PathPrefix(`/api/auth`))"
      - traefik.http.routers.slipstream-sync.priority=100
      - traefik.http.routers.slipstream-sync.entryPoints=web-secure
      - traefik.http.routers.slipstream-sync.tls=true
      - traefik.http.routers.slipstream-sync.tls.certresolver=myresolver
      - traefik.http.routers.slipstream-sync.middlewares=sablier-slipstream@file
      - traefik.http.services.slipstream-sync.loadbalancer.server.port=8787
      - sablier.enable=true
      - sablier.group=slipstream

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    container_name: slipstream-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SYNC_URL: https://tracker.hiten.dev
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set in .env}
      MONGODB_URI: mongodb://db:27017/slipstream?replicaSet=rs0
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
      sync:
        condition: service_started
    networks: [internal, frontend]
    labels:
      - com.centurylinklabs.watchtower.enable=false
      - traefik.enable=true
      - traefik.docker.network=home-server_frontend
      - traefik.http.routers.slipstream-web.rule=Host(`tracker.hiten.dev`)
      - traefik.http.routers.slipstream-web.entryPoints=web-secure
      - traefik.http.routers.slipstream-web.tls=true
      - traefik.http.routers.slipstream-web.tls.certresolver=myresolver
      - traefik.http.routers.slipstream-web.middlewares=sablier-slipstream@file
      - traefik.http.services.slipstream-web.loadbalancer.server.port=3000
      - sablier.enable=true
      - sablier.group=slipstream

networks:
  internal:
    driver: bridge
  frontend:
    external: true
    name: home-server_frontend

volumes:
  slipstream-db:
